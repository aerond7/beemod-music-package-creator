name: Bug report
description: Report a reproducible BMPC problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: bmpc-version
    attributes:
      label: BMPC version
      description: Use the app version shown in BMPC, or the commit if building from source.
      placeholder: "1.3.0"
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: bee2-version
    attributes:
      label: BEEmod/BEE2 version
      placeholder: "BEE2 version/build"
    validations:
      required: true
  - type: textarea
    id: install-path-context
    attributes:
      label: Install path context
      description: Describe where BMPC is installed relative to BEE2.exe.
      placeholder: "BMPC.exe is in the same folder as BEE2.exe."
    validations:
      required: true
  - type: input
    id: source-formats
    attributes:
      label: Source audio/image formats
      placeholder: ".mp3 audio, .png icon"
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open BMPC
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs/screenshots
      description: Add screenshots, error text, or relevant logs.
    validations:
      required: false
