name: Feature request
description: Suggest an improvement for BMPC
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What should BMPC do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches considered.
    validations:
      required: false
  - type: textarea
    id: extra-context
    attributes:
      label: Extra context
      description: Screenshots, mockups, compatibility notes, or related links.
    validations:
      required: false
