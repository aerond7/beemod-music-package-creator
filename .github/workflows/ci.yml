name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore src/BMPC.sln
      - run: dotnet build src/BMPC.sln --configuration Release --no-restore
      - run: dotnet test src/BMPC.sln --configuration Release --no-build
      - name: Publish self-contained executable
        run: |
          dotnet publish src/BMPC/BMPC.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output "$env:RUNNER_TEMP/publish"
