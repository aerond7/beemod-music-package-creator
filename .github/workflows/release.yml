name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  DOTNET_VERSION: 8.0.x
  ARTIFACT_NAME: BMPC-${{ github.ref_name }}-win-x64-self-contained

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/BMPC.sln

      - name: Test
        run: dotnet test src/BMPC.sln --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish src/BMPC/BMPC.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output "$env:RUNNER_TEMP/publish"

      - name: Archive
        run: Compress-Archive -Path "$env:RUNNER_TEMP/publish/*" -DestinationPath "$env:RUNNER_TEMP/$env:ARTIFACT_NAME.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/${{ env.ARTIFACT_NAME }}.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$env:GITHUB_REF_NAME" "$env:RUNNER_TEMP/$env:ARTIFACT_NAME.zip" --title "$env:GITHUB_REF_NAME" --notes "Automated release for $env:GITHUB_REF_NAME."
